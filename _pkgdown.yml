url: https://mdmanurung.github.io/rajiveplus/

template:
  bootstrap: 5

home:
  title: "rajiveplus: Robust Angle Based Joint and Individual Variation Explained"
  description: >
    A robust alternative to the aJIVE method for the estimation of joint and
    individual components in the presence of outliers in multi-source data.

navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [search, github]
  components:
    github:
      icon: fab fa-github fa-lg
      href: https://github.com/mdmanurung/rajiveplus
      aria-label: GitHub

articles:
  - title: "Vignettes"
    navbar: ~
    contents:
      - benchmarking
      - jackstraw_scaling
      - cll_application
      - function_gallery
      - microbiome_application

reference:
  - title: "Core decomposition"
    desc: "Run the RaJIVE decomposition and simulate data."
    contents:
      - Rajive
      - ajive.data.sim
      - sim_dist

  - title: "Rank accessors"
    desc: "Extract rank estimates from a `rajive` object."
    contents:
      - get_joint_rank
      - get_individual_rank
      - get_all_ranks

  - title: "Component accessors"
    desc: "Extract scores, loadings, and reconstructed matrices."
    contents:
      - get_joint_scores
      - get_block_scores
      - get_block_loadings
      - get_block_matrix

  - title: "S3 methods for `rajive` objects"
    desc: "print and summary methods."
    contents:
      - print.rajive
      - summary.rajive

  - title: "Variance explained"
    desc: "Quantify and visualise explained variance."
    contents:
      - showVarExplained_robust
      - plot_variance_explained

  - title: "Visualisation"
    desc: "Heatmaps and score plots."
    contents:
      - decomposition_heatmaps_robustH
      - data_heatmap
      - plot_scores

  - title: "Diagnostics and interpretation"
    desc: "Unified helpers for AJIVE diagnostics, feature ranking, association testing, and stability assessment."
    contents:
      - extract_components
      - rank_features
      - get_top_loadings
      - get_feature_contributions
      - compare_feature_sets_across_blocks
      - summarize_significant_vars
      - summarize_components
      - plot_components
      - associate_components
      - associate_scores_continuous
      - associate_scores_categorical
      - associate_scores_survival
      - assess_stability
      - bootstrap_joint_rank
      - bootstrap_loading_stability
      - plot_stability_heatmap
      - export_results
      - rajive_report
      - autoplot.rajive
      - autoplot.jackstraw_rajive
      - fortify.rajive
      - fortify.jackstraw_rajive

  - title: "Internal decomposition helpers"
    desc: "Low-level functions used internally by `Rajive()` to compute joint and individual decompositions."
    contents:
      - get_final_decomposition_robustH
      - get_individual_decomposition_robustH
      - get_joint_decomposition_robustH
      - get_joint_scores_robustH

  - title: "Robust SVD utilities"
    desc: "Functions for computing, truncating, and reconstructing the robust SVD."
    contents:
      - RobRSVD.all
      - RobRSVD1
      - get_svd_robustH
      - get_sv_threshold
      - truncate_svd
      - svd_reconstruction

  - title: "Rank estimation internals"
    desc: "Wedin bound and random direction bound helpers used in joint rank estimation."
    contents:
      - get_random_direction_bound_robustH
      - get_wedin_bound_samples
      - wedin_bound_resampling

  - title: "Jackstraw significance testing"
    desc: >
      Permutation-based test to identify variables with significantly
      non-zero joint loadings.
    contents:
      - jackstraw_rajive
      - print.jackstraw_rajive
      - summary.jackstraw_rajive
      - get_significant_vars
      - plot_jackstraw

  - title: "Package"
    desc: "Package-level documentation."
    contents:
      - rajiveplus-package
